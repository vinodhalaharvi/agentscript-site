<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08080a;--bg2:#0f0f12;--bg3:#17171c;--bg4:#1e1e24;
--text:#eae8e4;--text-dim:#7c7c82;--text-mid:#a8a8ae;
--accent:#c4f042;--accent2:#42f0c4;--accent3:#f0a842;
--accent-dim:rgba(196,240,66,0.08);--accent-glow:rgba(196,240,66,0.12);
--border:rgba(255,255,255,0.06);
--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Playfair Display',serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.6}
::selection{background:var(--accent);color:var(--bg)}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,240,66,.3)}50%{box-shadow:0 0 0 8px rgba(196,240,66,0)}}
.container{max-width:1140px;margin:0 auto;padding:0 28px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 0;background:rgba(8,8,10,.75);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border);transition:all .3s}
nav.scrolled{padding:12px 0;background:rgba(8,8,10,.92)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1140px;margin:0 auto;padding:0 28px}
.nav-logo{font-family:var(--mono);font-weight:500;font-size:18px;color:var(--text);text-decoration:none;letter-spacing:-.5px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:14px;font-weight:400;transition:color .2s;letter-spacing:.2px}
.nav-links a:hover{color:var(--text)}
.nav-cta{background:var(--accent)!important;color:var(--bg)!important;padding:8px 20px!important;border-radius:6px;font-weight:600!important;font-size:13px!important;letter-spacing:.3px;transition:transform .2s,box-shadow .2s!important}
.nav-cta:hover{transform:translateY(-1px)!important;box-shadow:0 4px 20px rgba(196,240,66,.25)!important}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;padding:120px 0 80px}
.hero-glow{position:absolute;width:700px;height:700px;border-radius:50%;filter:blur(160px);pointer-events:none;animation:glow 6s ease-in-out infinite}
.hero-glow-1{top:-200px;right:-150px;background:rgba(196,240,66,.06)}
.hero-glow-2{bottom:-200px;left:-200px;background:rgba(66,240,196,.04)}
.hero-content{position:relative;z-index:1;max-width:780px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px 6px 8px;background:var(--accent-dim);border:1px solid rgba(196,240,66,.15);border-radius:100px;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:28px;opacity:0;animation:fadeUp .7s .2s ease-out forwards}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.hero h1{font-family:var(--display);font-size:clamp(48px,7vw,82px);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:24px;opacity:0;animation:fadeUp .8s .3s ease-out forwards}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:19px;color:var(--text-dim);max-width:580px;line-height:1.7;margin-bottom:40px;opacity:0;animation:fadeUp .8s .45s ease-out forwards}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s .55s ease-out forwards}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;text-decoration:none;transition:all .25s;letter-spacing:.2px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,240,66,.3)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:15px;font-weight:500;font-family:var(--sans);cursor:pointer;text-decoration:none;transition:all .25s}
.btn-secondary:hover{border-color:rgba(255,255,255,.15);background:var(--bg3)}

/* TERMINAL */
.hero-terminal{margin-top:64px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;opacity:0;animation:fadeUp .9s .7s ease-out forwards}
.terminal-bar{display:flex;align-items:center;gap:7px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.terminal-title{flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.terminal-body{padding:24px;font-family:var(--mono);font-size:12.5px;line-height:1.9;overflow-x:auto}
.t-prompt{color:var(--accent);user-select:none}.t-cmd{color:var(--text)}.t-cmt{color:var(--text-dim);font-style:italic}.t-out{color:var(--accent2);padding-left:20px}.t-dim{color:var(--text-dim)}.t-kw{color:var(--accent)}.t-str{color:var(--accent2)}.t-op{color:var(--accent3)}

/* SECTIONS */
section{padding:120px 0;position:relative}
.section-label{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.section-title{font-family:var(--display);font-size:clamp(32px,4.5vw,52px);font-weight:800;line-height:1.12;letter-spacing:-1.5px;margin-bottom:20px}
.section-sub{font-size:17px;color:var(--text-dim);max-width:580px;line-height:1.7}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

/* SHOWCASES */
.showcase-grid{display:flex;flex-direction:column;gap:80px;margin-top:64px}
.showcase-item{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.showcase-item:nth-child(even){direction:rtl}.showcase-item:nth-child(even)>*{direction:ltr}
.showcase-text h3{font-size:24px;font-weight:700;margin-bottom:12px;letter-spacing:-.5px}
.showcase-text p{font-size:15px;color:var(--text-dim);line-height:1.7;margin-bottom:16px}
.showcase-tag{display:inline-block;padding:4px 10px;background:var(--accent-dim);border:1px solid rgba(196,240,66,.12);border-radius:100px;font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:500;margin-right:6px;margin-bottom:6px}
.showcase-code{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text-mid);overflow-x:auto;white-space:pre;position:relative}
.showcase-code .k{color:var(--accent)}.showcase-code .s{color:var(--accent2)}.showcase-code .o{color:var(--accent3)}.showcase-code .c{color:var(--text-dim)}

/* Run Pills */
.run-pills{display:flex;gap:6px;margin-bottom:8px}
.run-pill{padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all .2s;user-select:none}
.run-pill:hover{border-color:rgba(196,240,66,.2);color:var(--accent)}
.run-pill.active{border-color:rgba(196,240,66,.3);color:var(--accent);background:var(--accent-dim)}
.run-copy-btn{position:absolute;top:10px;right:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-family:var(--mono);font-size:10px;color:var(--text-dim);cursor:pointer;transition:all .2s;z-index:1}
.run-copy-btn:hover{border-color:var(--accent);color:var(--accent)}

/* DEMO VIDEO */
.demo-video{margin-top:64px;opacity:0;animation:fadeUp .9s .85s ease-out forwards}
.demo-video-label{text-align:center;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.demo-video-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--bg2)}
.demo-video-wrap video{width:100%;display:block}

/* HOW IT WORKS */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;margin-top:56px;counter-reset:step}
.step{position:relative;padding-top:48px}
.step::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;top:0;left:0;font-family:var(--display);font-size:36px;font-weight:800;color:var(--accent);opacity:.25}
.step h3{font-size:18px;font-weight:600;margin-bottom:10px;letter-spacing:-.3px}
.step p{font-size:14px;color:var(--text-dim);line-height:1.65}

/* INTEGRATIONS */
.integrations-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:40px}
.int-pill{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;color:var(--text-mid);transition:all .25s}
.int-pill:hover{border-color:rgba(196,240,66,.2);color:var(--text);background:var(--bg3)}
.int-pill span{font-size:15px}

/* DOWNLOADS */
.downloads-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:48px}
.dl-card{display:flex;align-items:center;gap:18px;padding:24px 28px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;text-decoration:none;transition:all .3s;cursor:pointer}
.dl-card:hover{border-color:rgba(196,240,66,.15);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.dl-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:22px;flex-shrink:0}
.dl-info h4{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.dl-info p{font-size:12px;color:var(--text-dim)}
.dl-tag{margin-left:auto;padding:4px 10px;background:var(--accent-dim);border:1px solid rgba(196,240,66,.12);border-radius:100px;font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:500;flex-shrink:0}
.dl-note{margin-top:24px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:13px;color:var(--text-dim);line-height:1.6}
.dl-note strong{color:var(--text)}

/* PRICING */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:56px}
.price-card{padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;transition:all .3s;position:relative}
.price-card.featured{border-color:rgba(196,240,66,.25);background:linear-gradient(180deg,rgba(196,240,66,.04),var(--bg2))}
.price-card.featured::before{content:'Most Popular';position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 16px;background:var(--accent);color:var(--bg);font-size:11px;font-weight:600;border-radius:100px;letter-spacing:.5px;text-transform:uppercase}
.price-tier{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.price-amt{font-family:var(--display);font-size:48px;font-weight:800;letter-spacing:-2px;margin-bottom:4px}
.price-amt span{font-family:var(--sans);font-size:16px;font-weight:400;color:var(--text-dim);letter-spacing:0}
.price-desc{font-size:14px;color:var(--text-dim);margin-bottom:28px;line-height:1.6}
.price-features{list-style:none;margin-bottom:32px}
.price-features li{padding:8px 0;font-size:14px;color:var(--text-mid);display:flex;align-items:center;gap:10px}
.price-features li::before{content:'✓';color:var(--accent);font-weight:700;font-size:13px}
.price-btn{display:block;width:100%;padding:14px;text-align:center;border-radius:8px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;text-decoration:none;transition:all .25s;border:none}
.price-btn-p{background:var(--accent);color:var(--bg)}
.price-btn-p:hover{box-shadow:0 6px 24px rgba(196,240,66,.3);transform:translateY(-2px)}
.price-btn-s{background:transparent;color:var(--text);border:1px solid var(--border)}
.price-btn-s:hover{border-color:rgba(255,255,255,.15);background:var(--bg3)}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:56px}
.contact-info h3{font-size:20px;font-weight:600;margin-bottom:16px}
.contact-info p{font-size:15px;color:var(--text-dim);line-height:1.7;margin-bottom:28px}
.contact-detail{display:flex;align-items:center;gap:12px;padding:14px 0;border-top:1px solid var(--border);font-size:14px}
.contact-detail-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px;font-size:16px;flex-shrink:0}
.contact-detail a{color:var(--text);text-decoration:none;transition:color .2s}
.contact-detail a:hover{color:var(--accent)}
.contact-form{display:flex;flex-direction:column;gap:16px}
.form-row{display:flex;gap:16px}
.form-group{flex:1;display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;font-weight:500;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase}
.form-group input,.form-group textarea,.form-group select{padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;transition:border-color .2s;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(196,240,66,.3)}
.form-group textarea{resize:vertical;min-height:120px}
.form-group select{cursor:pointer}.form-group select option{background:var(--bg2)}

/* FOOTER */
footer{padding:48px 0;border-top:1px solid var(--border)}
.footer-inner{display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-size:13px;color:var(--text-dim)}
.footer-links{display:flex;gap:24px}
.footer-links a{font-size:13px;color:var(--text-dim);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--text)}

/* MCP ECOSYSTEM */
.mcp-hero{position:relative;overflow:hidden}
.mcp-hero .hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(140px);pointer-events:none}
.mcp-glow-1{top:-100px;left:-100px;background:rgba(66,240,196,.07)}
.mcp-glow-2{bottom:-100px;right:-100px;background:rgba(196,240,66,.05)}
.mcp-stat-row{display:flex;gap:20px;margin-top:48px;flex-wrap:wrap}
.mcp-stat{flex:1;min-width:200px;padding:28px;background:var(--bg);border:1px solid var(--border);border-radius:12px;text-align:center}
.mcp-stat-num{font-family:var(--display);font-size:42px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mcp-stat-label{font-size:13px;color:var(--text-dim);margin-top:4px}
.mcp-diagram{margin-top:56px;padding:36px;background:var(--bg);border:1px solid var(--border);border-radius:14px;text-align:center}
.mcp-diagram-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}
.mcp-flow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:13px}
.mcp-flow-box{padding:12px 20px;border-radius:10px;border:1px solid var(--border)}
.mcp-flow-servers{background:linear-gradient(135deg,rgba(66,240,196,.08),rgba(66,240,196,.02));border-color:rgba(66,240,196,.2);color:var(--accent2)}
.mcp-flow-agent{background:linear-gradient(135deg,rgba(196,240,66,.12),rgba(196,240,66,.03));border-color:rgba(196,240,66,.25);color:var(--accent);font-weight:600;padding:16px 28px;font-size:15px}
.mcp-flow-outputs{background:linear-gradient(135deg,rgba(240,168,66,.08),rgba(240,168,66,.02));border-color:rgba(240,168,66,.2);color:var(--accent3)}
.mcp-flow-arrow{color:var(--text-dim);font-size:18px}
.mcp-examples{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-top:48px}
.mcp-card{padding:28px;background:var(--bg);border:1px solid var(--border);border-radius:12px;transition:all .3s}

// Shared highlight + CodeBlock — used by Showcases and MCP sections
const KW=/\b(search|summarize|ask|analyze|save|read|merge|email|notify|pdf_fields|pdf_fill|weather|crypto|stock|news_headlines|rss|reddit|job_search|image_generate|text_to_speech|images_to_video|audio_video_merge|youtube_shorts|youtube_upload|mcp_connect|mcp_agent|mcp_search_install|mcp_search|mcp|pfmap|claude|match|contains|doc_create|calendar|maps_trip|places_search|translate|perplexity_recent|form_create|sheet_create|task|contact_find|drive_save|video_generate|video_script|codereview|codereview_focus|table_render|hf_classify|hf_generate|hf_summarize|hf_ner|hf_translate|hf_qa|hf_zero_shot)\b/g;
function hl(code){
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/[^\n]*)/g,'\x01$1\x02')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'\x03$1\x04')
    .replace(/(&gt;=&gt;|&lt;\*&gt;)/g,'\x05$1\x06')
    .replace(KW,'<span class="k">$1</span>')
    .replace(/\x01([\s\S]*?)\x02/g,'<span class="c">$1</span>')
    .replace(/\x03([\s\S]*?)\x04/g,'<span class="s">$1</span>')
    .replace(/\x05([\s\S]*?)\x06/g,'<span class="o">$1</span>');
}
function CodeBlock({item}){
  const[mode,setMode]=useState('dsl');
  const[copied,setCopied]=useState(false);
  const copy=(text)=>{navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2000)};
  const shellEsc=(s)=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const setupBlock=item.setup||'';
  const setupDisplay=setupBlock?`<span class="c">${shellEsc(setupBlock)}</span>\n\n`:'';
  let display, copyText;
  if(mode==='dsl'){
    display=hl(item.code);
    copyText=item.code;
  } else if(mode==='file'){
    copyText=(setupBlock?setupBlock+'\n\n':'')+`cat > ${item.file} << 'EOF'\n${item.code}\nEOF\n\n./agentscript -f ${item.file}`;
    display=setupDisplay
      + `<span class="c">${shellEsc(`cat > ${item.file} << 'EOF'`)}</span>\n`
      + hl(item.code) + '\n'
      + `<span class="c">EOF</span>\n\n`
      + `<span class="o">${shellEsc(`./agentscript -f ${item.file}`)}</span>`;
  } else {
    copyText=(setupBlock?setupBlock+'\n\n':'')+`./agentscript -e '\n${item.code}\n'`;
    display=setupDisplay
      + `<span class="o">${shellEsc("./agentscript -e '")}</span>\n`
      + hl(item.code) + '\n'
      + `<span class="o">'</span>`;
  }
  return <div style={{position:'relative'}}>
    <div className="run-pills">
      <div className={`run-pill ${mode==='dsl'?'active':''}`} onClick={()=>setMode('dsl')}>DSL</div>
      <div className={`run-pill ${mode==='file'?'active':''}`} onClick={()=>setMode('file')}>cat &gt; file</div>
      <div className={`run-pill ${mode==='expr'?'active':''}`} onClick={()=>setMode('expr')}>-e</div>
    </div>
    <button className="run-copy-btn" onClick={()=>copy(copyText)}>{copied?'✓ Copied':'Copy'}</button>
    <div className="showcase-code" dangerouslySetInnerHTML={{__html:display}}/>
    {mode!=='dsl' && <div style={{marginTop:6,fontSize:11,color:'var(--text-dim)',fontFamily:'var(--mono)'}}>
      💡 Windows users: use Git Bash, WSL, or PowerShell with bash.
    </div>}
  </div>;
}
